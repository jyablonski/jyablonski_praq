<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today's Usage</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        --panel-bg: #fffaf0;
        --panel-border: #ead8b8;
        --primary-text: #2f241a;
        --muted-text: #7b6853;
        --accent-reddit: #ff6b35;
        --accent-youtube: #d62828;
        --accent-other: #5c7c77;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top left, rgba(255, 107, 53, 0.12), transparent 42%),
          radial-gradient(circle at top right, rgba(214, 40, 40, 0.12), transparent 38%),
          linear-gradient(180deg, #fffdf8 0%, #f7efe3 100%);
        color: var(--primary-text);
      }

      .popup {
        padding: 16px;
      }

      .eyebrow {
        margin: 0 0 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted-text);
      }

      .primary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .card {
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 12px 30px rgba(81, 56, 35, 0.08);
        padding: 14px;
      }

      .card.reddit {
        border-top: 4px solid var(--accent-reddit);
      }

      .card.youtube {
        border-top: 4px solid var(--accent-youtube);
      }

      .card.other {
        margin-top: 12px;
        border-top: 4px solid var(--accent-other);
      }

      .label {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted-text);
      }

      .value {
        margin: 0;
        font-size: 32px;
        line-height: 1;
        font-weight: 800;
      }

      .subvalue {
        margin: 10px 0 0;
        font-size: 14px;
        color: var(--muted-text);
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <p class="eyebrow">Today</p>

      <section class="primary-grid">
        <article class="card reddit">
          <p class="label">Reddit Posts</p>
          <p id="reddit-count" class="value">0</p>
        </article>

        <article class="card youtube">
          <p class="label">YouTube</p>
          <p id="youtube-count" class="value">0</p>
          <p id="youtube-hours" class="subvalue">0.00 hrs watched</p>
        </article>
      </section>

      <article class="card other">
        <p class="label">Other Pages</p>
        <p id="other-count" class="value">0</p>
      </article>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
